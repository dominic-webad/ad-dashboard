<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投放效果分析看板</title>
  <link rel="preload" href="./public/fb/manifest.json" as="fetch" crossorigin />
  <link rel="stylesheet" href="./css/style.css?v=20260618-7" />
</head>
<body>
  <div id="app">
    <div class="boot-screen">
      <div class="boot-spinner"></div>
      <p>正在初始化看板…</p>
    </div>
  </div>

  <script type="text/x-template" id="app-template">
    <div class="page">
      <div v-if="loading" class="boot-screen">
        <div class="boot-spinner"></div>
        <p>正在加载并解析投放数据…</p>
      </div>

      <div v-else-if="error" class="error-panel">
        <div class="error-icon">⚠️</div>
        <h2>页面加载失败</h2>
        <p>{{ error }}</p>
        <p class="error-hint">请确认已联网（需加载 Vue），并运行 <code>node scripts/convert-xlsx.js</code> 生成数据文件后刷新。图表库会在需要时自动加载。</p>
      </div>

      <div v-else class="dashboard-main">
        <header class="header">
          <div class="header-main">
            <div class="logo">{{ platformConfig.logo }}</div>
            <div>
              <h1>{{ platformConfig.label }} 投放效果分析看板</h1>
              <p>{{ platformConfig.subtitle }}</p>
            </div>
          </div>
          <div class="header-meta">
            <span class="badge badge-muted">{{ formatDateDisplay(manifestDateRange.min) }} ~ {{ formatDateDisplay(manifestDateRange.max) }}</span>
            <template v-if="isLoggedIn">
              <span class="badge badge-user">{{ authUser ? authUser.displayName : '' }}</span>
              <span v-if="protectedScopeHint && protectedScopeHint !== '全部数据'" class="badge badge-scope">{{ protectedScopeHint }}</span>
              <button type="button" class="btn-auth" @click="handleLogout">退出</button>
            </template>
            <button v-else type="button" class="btn-auth btn-auth-primary" @click="openLoginModal">登录</button>
          </div>
        </header>

        <nav class="platform-tabs">
          <button
            v-for="p in platformList"
            :key="p.id"
            type="button"
            class="platform-tab"
            :class="{ active: platform === p.id }"
            @click="switchPlatform(p.id)"
          >{{ p.label }}</button>
        </nav>

        <section class="filters">
          <div class="filters-title-row">
            <div class="filters-title">数据筛选</div>
            <div class="btn-group date-presets">
              <button type="button" :class="{ active: isDatePresetActive('yesterday') }" @click="applyDatePreset('yesterday')">昨天</button>
              <button type="button" :class="{ active: isDatePresetActive('last3') }" @click="applyDatePreset('last3')">过去 3 天</button>
              <button type="button" :class="{ active: isDatePresetActive('last7') }" @click="applyDatePreset('last7')">过去 7 天</button>
              <button type="button" :class="{ active: isDatePresetActive('last14') }" @click="applyDatePreset('last14')">过去 14 天</button>
            </div>
          </div>
          <div class="filters-grid">
            <div class="filter-group">
              <label>开始日期</label>
              <input type="date" v-model="filters.dateStart" @change="clearDatePreset()" @click="openDatePicker" />
            </div>
            <div class="filter-group">
              <label>结束日期</label>
              <input type="date" v-model="filters.dateEnd" @change="clearDatePreset()" @click="openDatePicker" />
            </div>
            <div class="filter-group" v-if="platformConfig.filters.showOptimizer">
              <label>优化师</label>
              <select v-model="filters.optimizer" :disabled="!isLoggedIn" :title="isLoggedIn ? '' : '登录后可筛选优化师'">
                <option value="">{{ authUser && authUser.role !== 'admin' && !isApplovin ? '本人 + Creative' : '全部优化师' }}</option>
                <option v-for="o in visibleOptimizers" :key="o" :value="o">{{ o }}</option>
              </select>
            </div>

            <div class="filter-group multiselect-wrap" :class="{ 'is-disabled': !isLoggedIn }">
              <label>{{ platformConfig.filters.accountLabel }}（可多选）</label>
              <div
                class="multiselect"
                :class="{ 'is-disabled': !isLoggedIn }"
                :title="isLoggedIn ? '' : '登录后可筛选账号'"
                @click.stop="openAccountDropdown"
              >
                <div class="multiselect-display">
                  <span v-if="!filters.accounts.length" class="placeholder">{{ platformConfig.filters.accountPlaceholder }}</span>
                  <span v-else class="selected-count">已选 {{ filters.accounts.length }} 个{{ isApplovin ? ' Set' : '账号' }}</span>
                </div>
                <div v-if="accountDropdownOpen" class="multiselect-panel" @click.stop>
                  <input class="multiselect-search" v-model="accountSearch" placeholder="搜索账号…" />
                  <div class="multiselect-actions">
                    <button type="button" @click="selectVisibleAccounts">全选当前</button>
                    <button type="button" @click="clearAccounts">清空</button>
                  </div>
                  <div class="multiselect-list">
                    <label v-for="a in filteredAccountOptions" :key="a" class="multiselect-item">
                      <input type="checkbox" :checked="isAccountSelected(a)" @change="toggleAccount(a)" />
                      <span>{{ a }}</span>
                    </label>
                  </div>
                </div>
              </div>
              <div v-if="filters.accounts.length" class="selected-tags">
                <span v-for="a in filters.accounts.slice(0, 3)" :key="a" class="tag">{{ a }}</span>
                <span v-if="filters.accounts.length > 3" class="tag tag-more">+{{ filters.accounts.length - 3 }}</span>
              </div>
            </div>

            <div class="filter-group multiselect-wrap">
              <label>国家（可多选）</label>
              <div class="multiselect" @click.stop="countryDropdownOpen = !countryDropdownOpen; accountDropdownOpen = false">
                <div class="multiselect-display">
                  <span v-if="!filters.countries.length" class="placeholder">全部国家</span>
                  <span v-else class="selected-count">已选 {{ filters.countries.length }} 个国家</span>
                </div>
                <div v-if="countryDropdownOpen" class="multiselect-panel" @click.stop>
                  <input class="multiselect-search" v-model="countrySearch" placeholder="搜索国家…" />
                  <div class="multiselect-actions">
                    <button type="button" @click="selectVisibleCountries">全选当前</button>
                    <button type="button" @click="clearCountries">清空</button>
                  </div>
                  <div class="multiselect-list">
                    <label v-for="c in filteredCountryOptions" :key="c" class="multiselect-item">
                      <input type="checkbox" :checked="isCountrySelected(c)" @change="toggleCountry(c)" />
                      <span>{{ c }}</span>
                    </label>
                  </div>
                </div>
              </div>
              <div v-if="filters.countries.length" class="selected-tags">
                <span v-for="c in filters.countries.slice(0, 6)" :key="c" class="tag">{{ c }}</span>
                <span v-if="filters.countries.length > 6" class="tag tag-more">+{{ filters.countries.length - 6 }}</span>
              </div>
            </div>

            <div class="filter-group filter-action">
              <label>&nbsp;</label>
              <button class="btn-reset" type="button" @click="resetFilters">重置筛选</button>
            </div>
          </div>
        </section>

        <section v-if="!canViewCore" class="panel auth-gate-panel">
          <div class="auth-gate">
            <div class="auth-gate-icon">🔒</div>
            <h2 v-if="isApplovin && isLoggedIn">需管理员权限</h2>
            <h2 v-else-if="isApplovin">核心 KPI 需管理员登录</h2>
            <h2 v-else>核心数据模块需登录</h2>
            <p v-if="isApplovin && isLoggedIn" class="auth-gate-desc">当前账号无权查看 AppLovin 核心 KPI 与趋势，请使用 admin 登录。下方漏斗、国家、素材等模块仍可正常查看。</p>
            <p v-else-if="isApplovin" class="auth-gate-desc">顶部 KPI 指标与核心指标趋势需要 admin 登录后查看。漏斗转化率、转化漏斗分析、投放国家、素材对比、生命周期等模块无需登录。</p>
            <p v-else class="auth-gate-desc">KPI 指标、核心指标趋势、转化漏斗分析需要登录后查看。投放国家、素材对比、生命周期等模块无需登录。</p>
            <form v-if="!isLoggedIn" class="auth-form" @submit.prevent="handleLogin">
              <div class="auth-form-row">
                <input v-model="loginForm.username" class="auth-input" type="text" placeholder="用户名" autocomplete="username" required />
                <input v-model="loginForm.password" class="auth-input" type="password" placeholder="密码" autocomplete="current-password" required />
                <button type="submit" class="btn-auth btn-auth-primary">登录</button>
              </div>
              <p v-if="loginError" class="auth-error">{{ loginError }}</p>
            </form>
          </div>
        </section>

        <template v-if="canViewCore">
        <section class="kpi-grid core-kpi-grid">
          <div class="kpi-card" v-for="k in kpiCards" :key="k.label" :style="{ '--accent': k.accent }">
            <div class="kpi-body">
              <div class="kpi-top">
                <span class="kpi-icon">{{ k.icon }}</span>
                <span class="kpi-label">{{ k.label }}</span>
              </div>
              <div class="kpi-value">{{ k.value }}</div>
            </div>
            <div class="kpi-footer">
              <span class="kpi-sub">{{ k.sub }}</span>
              <button type="button" class="kpi-trend-btn" @click="openKpiTrend(k, 'kpi')" title="查看趋势图" aria-label="查看趋势图">
                <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <rect x="1.25" y="1.25" width="13.5" height="13.5" rx="1.5" stroke="currentColor" stroke-width="1.2" />
                  <rect x="3.75" y="9" width="2" height="3.75" fill="currentColor" />
                  <rect x="7" y="6.25" width="2" height="6.5" fill="currentColor" />
                  <rect x="10.25" y="4" width="2" height="8.75" fill="currentColor" />
                </svg>
              </button>
            </div>
          </div>

          <section class="panel trend-panel core-kpi-trend">
            <div class="panel-header">
              <div>
                <h2>核心指标趋势</h2>
                <p class="hint">柱状图：消耗 · 折线图（右轴）：{{ isApplovin ? 'D0 ROAS' : 'ROAS' }} · 按日期升序</p>
              </div>
              <div class="controls">
                <div class="btn-group">
                  <button type="button" :class="{ active: granularity === 'day' }" @click="granularity = 'day'">日</button>
                  <button type="button" :class="{ active: granularity === 'week' }" @click="granularity = 'week'">周</button>
                  <button type="button" :class="{ active: granularity === 'month' }" @click="granularity = 'month'">月</button>
                </div>
              </div>
            </div>
            <div id="trend-chart" class="chart"></div>
          </section>
        </section>
        </template>

        <template v-if="canViewFunnel">
        <section class="kpi-section-label">漏斗转化率</section>
        <section class="kpi-grid funnel-kpi-grid" :class="isApplovin ? 'funnel-kpi-4' : 'funnel-kpi-6'">
          <div class="kpi-card" v-for="k in funnelKpiCards" :key="k.label" :style="{ '--accent': k.accent }">
            <div class="kpi-body">
              <div class="kpi-top">
                <span class="kpi-label">{{ k.label }}</span>
              </div>
              <div class="kpi-value">{{ k.value }}</div>
            </div>
            <div class="kpi-footer">
              <span class="kpi-sub">{{ k.sub }}</span>
              <button type="button" class="kpi-trend-btn" @click="openKpiTrend(k, 'funnel')" title="查看趋势图" aria-label="查看趋势图">
                <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <rect x="1.25" y="1.25" width="13.5" height="13.5" rx="1.5" stroke="currentColor" stroke-width="1.2" />
                  <rect x="3.75" y="9" width="2" height="3.75" fill="currentColor" />
                  <rect x="7" y="6.25" width="2" height="6.5" fill="currentColor" />
                  <rect x="10.25" y="4" width="2" height="8.75" fill="currentColor" />
                </svg>
              </button>
            </div>
          </div>
        </section>

        <section class="panel funnel-panel">
          <div class="panel-header">
            <div>
              <h2>转化漏斗分析</h2>
              <p v-if="isApplovin" class="hint">展示 → 浏览商品 → 加购 → 结账 → D0 购买</p>
              <p v-else class="hint">Click → LPV → 加购 → 结账 → 支付信息 → 购买</p>
            </div>
            <select v-if="isApplovin" class="select-sm" v-model="funnelCountry">
              <option value="">全部国家（汇总）</option>
              <option v-for="c in funnelCountries" :key="c.country" :value="c.country">{{ c.country }}</option>
            </select>
            <select v-else class="select-sm" v-model="funnelAccount">
              <option value="">全部账号（汇总）</option>
              <option v-for="a in funnelAccounts" :key="a.accountName" :value="a.accountName">{{ a.accountName }}</option>
            </select>
          </div>
          <div class="funnel-layout">
            <div class="funnel-chart-wrap">
              <p class="funnel-chart-caption">左侧示例 · 右侧数字为当前筛选后全量转化率</p>
              <div id="funnel-chart" class="chart funnel-chart"></div>
            </div>
            <div class="funnel-table-wrap">
              <div class="funnel-table-body-scroll">
              <!-- AppLovin country funnel table -->
              <table v-if="isApplovin" class="funnel-table funnel-table-main">
                <colgroup>
                  <col class="funnel-col-account" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-metric" />
                </colgroup>
                <thead>
                  <tr>
                    <th class="col-account">国家</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('spend', $event)">花费 {{ funnelSortIcon('spend') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('purchases', $event)">D0 转化 {{ funnelSortIcon('purchases') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('revenue', $event)">D0 收入 {{ funnelSortIcon('revenue') }}</th>
                    <th class="sortable col-roas" @click="sortFunnelColumn('roas', $event)">D0 ROAS {{ funnelSortIcon('roas') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('impressionToView', $event)">展示→浏览 {{ funnelSortIcon('impressionToView') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('viewToCart', $event)">浏览→加购 {{ funnelSortIcon('viewToCart') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('cartToCheckout', $event)">加购→结账 {{ funnelSortIcon('cartToCheckout') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('checkoutToPurchase', $event)">结账→D0 {{ funnelSortIcon('checkoutToPurchase') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('payRate', $event)">D0 付费率 {{ funnelSortIcon('payRate') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('usCpm', $event)">CPM {{ funnelSortIcon('usCpm') }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="c in sortedFunnelTable" :key="c.country" :class="{ active: funnelCountry === c.country }">
                    <td class="account-cell" @click="funnelCountry = c.country">{{ c.country }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(c.spend) }}</td>
                    <td class="col-spend">{{ formatNumber(c.purchases, 0) }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(c.revenue) }}</td>
                    <td class="col-roas"><span :class="roasClass(c.roas)">{{ formatNumber(c.roas, 2) }}</span></td>
                    <td class="col-rate">{{ formatPercent(c.funnelRates.impressionToView) }}</td>
                    <td class="col-rate">{{ formatPercent(c.funnelRates.viewToCart) }}</td>
                    <td class="col-rate">{{ formatPercent(c.funnelRates.cartToCheckout) }}</td>
                    <td class="col-rate">{{ formatPercent(c.funnelRates.checkoutToPurchase) }}</td>
                    <td class="col-rate">{{ formatPercent(c.funnelRates.payRate) }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(c.usCpm) }}</td>
                  </tr>
                </tbody>
              </table>
              <!-- FB account funnel table -->
              <table v-else class="funnel-table funnel-table-main">
                <colgroup>
                  <col class="funnel-col-account" />
                  <col class="funnel-col-optimizer" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-metric" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-rate" />
                  <col class="funnel-col-metric" />
                </colgroup>
                <thead>
                  <tr>
                    <th class="col-account">账号</th>
                    <th class="sortable col-optimizer" @click="sortFunnelColumn('optimizer', $event)">优化师 {{ funnelSortIcon('optimizer') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('spend', $event)">花费 {{ funnelSortIcon('spend') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('purchases', $event)">Purchase {{ funnelSortIcon('purchases') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('revenue', $event)">Revenue {{ funnelSortIcon('revenue') }}</th>
                    <th class="sortable col-roas" @click="sortFunnelColumn('roas', $event)">ROAS {{ funnelSortIcon('roas') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('clickToLpv', $event)">Click→LPV {{ funnelSortIcon('clickToLpv') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('lpvToCart', $event)">LPV→加购 {{ funnelSortIcon('lpvToCart') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('cartToCheckout', $event)">加购→结账 {{ funnelSortIcon('cartToCheckout') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('checkoutToPay', $event)">结账→支付 {{ funnelSortIcon('checkoutToPay') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('payToPurchase', $event)">支付→购买 {{ funnelSortIcon('payToPurchase') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('payRate', $event)">付费率 {{ funnelSortIcon('payRate') }}</th>
                    <th class="sortable col-rate" @click="sortFunnelColumn('usPayRate', $event)">US付费率 {{ funnelSortIcon('usPayRate') }}</th>
                    <th class="sortable col-spend" @click="sortFunnelColumn('usCpm', $event)">US CPM {{ funnelSortIcon('usCpm') }}</th>
                  </tr>
                </thead>
                <tbody>
                  <tr
                    v-for="a in sortedFunnelTable"
                    :key="a.accountName"
                    :class="{ active: funnelAccount === a.accountName }"
                  >
                    <td class="account-cell" @click="funnelAccount = a.accountName">{{ a.accountName }}</td>
                    <td class="col-optimizer">{{ a.optimizer }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(a.spend) }}</td>
                    <td class="col-spend">{{ formatNumber(a.purchases, 0) }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(a.revenue) }}</td>
                    <td class="col-roas"><span :class="roasClass(a.roas)">{{ formatNumber(a.roas, 2) }}</span></td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.clickToLpv) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.lpvToCart) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.cartToCheckout) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.checkoutToPay) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.payToPurchase) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.payRate) }}</td>
                    <td class="col-rate">{{ formatPercent(a.funnelRates.usPayRate) }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(a.usCpm) }}</td>
                  </tr>
                </tbody>
              </table>
              </div>
              <div class="funnel-table-footer">
                <div class="funnel-table-footer-inner">
                <table v-if="isApplovin" class="funnel-table funnel-table-summary">
                  <colgroup>
                    <col class="funnel-col-account" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-rate" />
                    <col class="funnel-col-rate" />
                    <col class="funnel-col-rate" />
                    <col class="funnel-col-rate" />
                    <col class="funnel-col-rate" />
                    <col class="funnel-col-metric" />
                  </colgroup>
                  <tr class="summary-row" :class="{ active: !funnelCountry }">
                    <td class="account-cell" @click="funnelCountry = ''">{{ funnelSummaryRow.country }}</td>
                    <td class="col-spend">{{ formatCurrencyExact(funnelSummaryRow.spend) }}</td>
                    <td class="col-spend">{{ formatNumber(funnelSummaryRow.purchases, 0) }}</td>
                    <td class="col-spend">{{ formatCurrencyExact(funnelSummaryRow.revenue) }}</td>
                    <td class="col-roas"><span :class="roasClass(funnelSummaryRow.roas)">{{ formatNumber(funnelSummaryRow.roas, 2) }}</span></td>
                    <td class="col-rate">{{ formatPercent(funnelSummaryRow.funnelRates.impressionToView) }}</td>
                    <td class="col-rate">{{ formatPercent(funnelSummaryRow.funnelRates.viewToCart) }}</td>
                    <td class="col-rate">{{ formatPercent(funnelSummaryRow.funnelRates.cartToCheckout) }}</td>
                    <td class="col-rate">{{ formatPercent(funnelSummaryRow.funnelRates.checkoutToPurchase) }}</td>
                    <td class="col-rate">{{ formatPercent(funnelSummaryRow.funnelRates.payRate) }}</td>
                    <td class="col-spend">{{ formatCurrencyInteger(funnelSummaryRow.usCpm) }}</td>
                  </tr>
                </table>
                <table v-else class="funnel-table funnel-table-summary">
                  <colgroup>
                    <col class="funnel-col-account" />
                    <col class="funnel-col-optimizer" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />
                    <col class="funnel-col-metric" />

  <script>
    (function () {
      var BUILD = '20260618-7';
      var appEl = document.getElementById('app');

      function showBootError(message) {
        if (!appEl) return;
        appEl.innerHTML =
          '<div class="page"><div class="error-panel">' +
          '<div class="error-icon">⚠️</div>' +
          '<h2>页面加载失败</h2>' +
          '<p>' + message + '</p>' +
          '<p class="error-hint">请强制刷新页面（Cmd+Shift+R 或 Ctrl+F5）后重试。</p>' +
          '</div></div>';
      }

      function loadScript(src) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src;
          s.async = false;
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error(src)); };
          document.head.appendChild(s);
        });
      }

      function loadFirst(urls, label) {
        function tryAt(index) {
          if (index >= urls.length) {
            return Promise.reject(new Error(label + ' 加载失败，请检查网络连接'));
          }
          return loadScript(urls[index]).catch(function () {
            return tryAt(index + 1);
          });
        }
        return tryAt(0);
      }

      var vueUrls = [
        'https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js',
        'https://unpkg.com/vue@3/dist/vue.global.prod.js',
      ];
      var parallelLocalScripts = [
        './js/utils.js?v=' + BUILD,
        './js/platform-config.js?v=' + BUILD,
        './js/auth.js?v=' + BUILD,
      ];
      var sequentialLocalScripts = [
        './js/data-store.js?v=' + BUILD,
        './js/app.js?v=' + BUILD,
      ];

      loadFirst(vueUrls, 'Vue')
        .then(function () {
          return Promise.all(parallelLocalScripts.map(loadScript));
        })
        .then(function () {
          return sequentialLocalScripts.reduce(function (chain, src) {
            return chain.then(function () { return loadScript(src); });
          }, Promise.resolve());
        })
        .catch(function (err) {
          showBootError((err && err.message) || '脚本加载失败');
        });
    })();
  </script>
